{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'articles/css/article.css' %}">
</head>
<body class="archive">
    <div class="header">
        <div class="header-top">
            <img src="{% static 'articles/img/dpb-logo.png' %}" alt="Логотип">
            <div class="header-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'create_post' %}">Новая статья</a>
                    <a href="{% url 'logout' %}">Выход</a>
                {% else %}
                    <a href="{% url 'login' %}">Вход</a>
                    <a href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <div class="post-managment">
                <h2 class="post-title">
                    <a href="{% url 'get_article' post.id %}">{{ post.title }}</a>
                </h2>
                <button class="fold-button" type="button">свернуть</button>
            </div>

            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>

            <p class="article-text">{{ post.get_excerpt }}</p>

            <div class="one-post-shadow"></div>
        </div>
        {% endfor %}
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{% static 'articles/js/helloworld.js' %}"></script>
    <script src="{% static 'articles/js/fold-post.js' %}"></script>
    <script src="{% static 'articles/js/highlight-post.js' %}"></script>
    <script src="{% static 'articles/js/logo-hover.js' %}"></script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'articles/css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <div class="header-top">
            <img src="{% static 'articles/img/dpb-logo.png' %}" alt="Логотип">
            <div class="header-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'create_post' %}">Новая статья</a>
                    <a href="{% url 'logout' %}">Выход</a>
                {% else %}
                    <a href="{% url 'login' %}">Вход</a>
                    <a href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="archive">
        <a class="all-posts-link" href="{% url 'archive' %}">Все записи</a>

        <div class="one-post">
            <h1 class="post-title">{{ post.title }}</h1>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.text }}</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{% static 'articles/js/logo-hover.js' %}"></script>
</body>
</html>
